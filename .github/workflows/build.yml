name: Build MoyaChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # fuer das Release noetig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Version je Build hochzaehlen, damit Re-Installs auf dem Geraet greifen
      - name: Bump version from run number
        run: |
          set -e
          sed -i "s/versionCode 1$/versionCode ${{ github.run_number }}/" build.gradle
          sed -i "s/versionName \"1.0.0\"/versionName \"1.0.${{ github.run_number }}\"/" build.gradle
          grep -nE "versionCode|versionName" build.gradle | head

      # Sideload-Variante ohne FCM (Websocket-Push) — ideal zum Testen auf eigenen Geraeten
      - name: Build debug APK (conversationsFree)
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace :assembleConversationsFreeDebug

      - name: Stage APKs (stabile Namen)
        run: |
          set -e
          UNI=$(find build/outputs/apk/conversationsFree/debug -name '*universal*debug.apk' | head -1)
          ARM=$(find build/outputs/apk/conversationsFree/debug -name '*arm64-v8a*debug.apk' | head -1)
          echo "universal: $UNI"; echo "arm64: $ARM"
          cp "$UNI" MoyaChat.apk
          cp "$ARM" MoyaChat-arm64.apk
          ls -la MoyaChat.apk MoyaChat-arm64.apk

      - name: Upload APK (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: MoyaChat-debug-apk
          path: |
            MoyaChat.apk
            MoyaChat-arm64.apk
          if-no-files-found: error

      # Stabile Download-URL:
      # https://github.com/moyabotdev/moyachat-android/releases/download/latest/MoyaChat.apk
      - name: Publish to GitHub Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: MoyaChat — neuester Build
          files: |
            MoyaChat.apk
            MoyaChat-arm64.apk
          make_latest: true
